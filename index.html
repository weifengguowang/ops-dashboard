<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>运营管控 Demo</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
.phone-frame {
  width: 375px; height: 812px;
  background: #F5F5F5;
  border-radius: 40px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  display: flex; flex-direction: column;
}
.status-bar {
  height: 44px; background: #fff;
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 20px; font-size: 12px; color: #333; flex-shrink: 0;
}
.page-container { flex: 1; overflow: hidden; position: relative; }
.page {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch; background: #F5F5F5;
  transition: transform 0.3s ease, opacity 0.3s ease;
  transform: translateX(100%); opacity: 0;
  will-change: transform, opacity;
}
.page.active { transform: translateX(0); opacity: 1; }
.page.prev { transform: translateX(-30%); opacity: 0; }
.tab-bar {
  height: 64px; background: #fff; border-top: 1px solid #eee;
  display: flex; flex-shrink: 0; padding-bottom: 8px;
}
.tab-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 2px;
  cursor: pointer; transition: all 0.2s;
  -webkit-tap-highlight-color: transparent; user-select: none;
}
.tab-item:active { transform: scale(0.95); }
.tab-item .tab-icon { font-size: 22px; line-height: 1; }
.tab-item .tab-label { font-size: 10px; color: #999; }
.tab-item.active .tab-label { color: #FF6B35; font-weight: 600; }
.card {
  background: #fff; border-radius: 12px; padding: 16px;
  margin: 0 12px 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all 0.2s; border: none;
  -webkit-tap-highlight-color: transparent; user-select: none;
}
.btn:active { transform: scale(0.95); }
.btn-primary { background: #FF6B35; color: #fff; }
.btn-outline { background: transparent; border: 1px solid #ddd; color: #666; }
.btn-success { background: #00C853; color: #fff; }
.btn-danger { background: #FF4444; color: #fff; }
.btn-sm { padding: 4px 10px; font-size: 11px; }
.pulse-dot {
  width: 8px; height: 8px; border-radius: 50%; background: #FF4444;
  display: inline-block; animation: pulse 1.5s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.3); }
}
.pull-indicator {
  text-align: center; padding: 10px; font-size: 12px; color: #999;
  transition: all 0.3s; height: 0; overflow: hidden;
}
.pull-indicator.show { height: 40px; }
.drawer-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.4); z-index: 100;
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.drawer-overlay.show { opacity: 1; pointer-events: auto; }
.drawer {
  position: fixed; bottom: 0; left: 50%;
  transform: translateX(-50%) translateY(100%);
  width: 375px; background: #fff; border-radius: 20px 20px 0 0;
  padding: 20px; z-index: 101; transition: transform 0.3s ease;
  max-height: 60vh; overflow-y: auto;
}
.drawer.show { transform: translateX(-50%) translateY(0); }
.drawer-handle {
  width: 40px; height: 4px; background: #ddd;
  border-radius: 2px; margin: 0 auto 16px;
}
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 200;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.modal-overlay.show { opacity: 1; pointer-events: auto; }
.modal-box {
  width: 300px; background: #fff; border-radius: 16px;
  padding: 24px; text-align: center;
}
.modal-box h3 { font-size: 16px; margin-bottom: 8px; }
.modal-box p { font-size: 13px; color: #666; margin-bottom: 20px; }
.modal-actions { display: flex; gap: 12px; justify-content: center; }
.modal-actions .btn { flex: 1; }
.page::-webkit-scrollbar { width: 0; }
.chart-svg { width: 100%; height: 160px; }
.matrix-wrap { overflow-x: auto; }
.matrix-table { border-collapse: collapse; font-size: 12px; min-width: 320px; }
.matrix-table th, .matrix-table td {
  padding: 8px 6px; text-align: center;
  border-bottom: 1px solid #f0f0f0; white-space: nowrap;
}
.matrix-table th { color: #999; font-weight: 500; font-size: 11px; }
.matrix-table td:first-child { text-align: left; font-weight: 500; color: #333; }
.dot-status {
  display: inline-block; width: 20px; height: 20px;
  border-radius: 50%; cursor: pointer; transition: transform 0.2s;
}
.dot-status:active { transform: scale(1.2); }
.dot-red { background: #FF4444; }
.dot-green { background: #00C853; }
.dot-yellow { background: #FFC107; }
.dot-blue { background: #2196F3; }
.dot-purple { background: #9C27B0; animation: pulse-purple 1.5s infinite; }
@keyframes pulse-purple {
  0%, 100% { box-shadow: 0 0 0 0 rgba(156,39,176,0.4); }
  50% { box-shadow: 0 0 0 8px rgba(156,39,176,0); }
}
.timeline { position: relative; padding-left: 20px; }
.timeline::before {
  content: ''; position: absolute; left: 8px;
  top: 0; bottom: 0; width: 2px; background: #eee;
}
.timeline-item {
  position: relative; padding: 12px 0 12px 16px;
  border-bottom: 1px solid #f5f5f5;
}
.timeline-item::before {
  content: ''; position: absolute; left: -16px; top: 16px;
  width: 10px; height: 10px; border-radius: 50%;
  background: #FF6B35; border: 2px solid #fff;
  box-shadow: 0 0 0 2px #FF6B35;
}
.timeline-date { font-size: 13px; font-weight: 600; color: #333; margin-bottom: 4px; }
.timeline-content { font-size: 12px; color: #666; line-height: 1.6; }
.timeline-content .tag {
  display: inline-block; padding: 1px 6px; border-radius: 4px;
  font-size: 11px; margin: 0 2px;
}
.tag-red { background: #FFF0F0; color: #FF4444; }
.tag-green { background: #F0FFF4; color: #00C853; }
.tag-yellow { background: #FFF8E1; color: #F57F17; }
.tag-purple { background: #F3E5F5; color: #9C27B0; }
.tag-blue { background: #E3F2FD; color: #2196F3; }
.calendar-grid {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 4px; text-align: center;
}
.calendar-header { font-size: 11px; color: #999; padding: 4px 0; }
.calendar-day {
  padding: 8px 0; font-size: 13px; border-radius: 8px;
  cursor: pointer; position: relative; transition: background 0.2s;
}
.calendar-day:active { background: #f0f0f0; }
.calendar-day.has-event::after {
  content: ''; position: absolute; bottom: 2px;
  left: 50%; transform: translateX(-50%);
  width: 6px; height: 6px; border-radius: 50%; background: #FF6B35;
}
.calendar-day.today { background: #FFF0E8; color: #FF6B35; font-weight: 600; }
.calendar-day.other-month { color: #ddd; }
.empty-state { text-align: center; padding: 40px 20px; }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state .text { font-size: 14px; color: #999; }
.alert-item { cursor: pointer; }
.alert-item:active { background: #fafafa; }
.alert-detail { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
.alert-detail.open { max-height: 200px; }
.price-channel {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 0; font-size: 13px;
}
.price-channel .channel-name { width: 50px; color: #666; flex-shrink: 0; }
.price-channel .channel-price { font-weight: 500; }
.price-channel .channel-status { margin-left: auto; font-size: 11px; }
.price-channel .channel-diff { font-size: 11px; color: #FF4444; }
.bar-chart { display: flex; flex-direction: column; gap: 8px; }
.bar-row { display: flex; align-items: center; gap: 8px; }
.bar-label { width: 50px; font-size: 12px; color: #666; flex-shrink: 0; }
.bar-track { flex: 1; height: 20px; background: #f0f0f0; border-radius: 10px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 10px; transition: width 0.6s ease; }
.bar-value { width: 40px; text-align: right; font-size: 12px; color: #333; font-weight: 500; }
.rank-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 28px; height: 28px; border-radius: 50%;
  font-size: 14px; font-weight: 700; color: #fff;
}
.rank-1 { background: linear-gradient(135deg, #FFD700, #FFA000); }
.rank-2 { background: linear-gradient(135deg, #C0C0C0, #9E9E9E); }
.rank-3 { background: linear-gradient(135deg, #CD7F32, #8D6E63); }
.rank-other { background: #e0e0e0; color: #999; }
@keyframes countUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.count-animate { animation: countUp 0.5s ease forwards; }
@keyframes checkmark {
  0% { transform: scale(0); opacity: 0; }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); opacity: 1; }
}
.check-animate { animation: checkmark 0.5s ease forwards; }
.metrics-scroll {
  display: flex; gap: 12px; overflow-x: auto;
  padding: 0 12px 12px;
  -webkit-overflow-scrolling: touch; scroll-snap-type: x mandatory;
}
.metrics-scroll::-webkit-scrollbar { display: none; }
.metric-card {
  min-width: 140px; background: #fff; border-radius: 12px;
  padding: 14px; scroll-snap-align: start;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04); flex-shrink: 0;
}
.metric-label { font-size: 12px; color: #999; margin-bottom: 4px; }
.metric-value { font-size: 24px; font-weight: 700; color: #333; }
.metric-change { font-size: 11px; margin-top: 4px; }
.metric-change.up { color: #00C853; }
.metric-change.down { color: #FF4444; }
.metric-change.warn { color: #FFC107; }
.todo-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 0; border-bottom: 1px solid #f5f5f5;
}
.todo-item:last-child { border-bottom: none; }
.todo-info { flex: 1; }
.todo-title { font-size: 14px; font-weight: 500; color: #333; }
.todo-desc { font-size: 12px; color: #999; margin-top: 2px; }
</style>
</head>
<body>

<div class="phone-frame" id="app">

  <div class="page-container" id="pageContainer">

      </div>
      <div class="metrics-scroll" id="metricsScroll">

          <div class="metric-label">同频指数</div>
          <div class="metric-value" style="color:#FF4444;"><span class="count-up" data-target="78">0</span>分</div>
          <div class="metric-change down">环比 <span class="count-up" data-target="5">0</span></div>

        <div class="metric-card">
          <div class="metric-label">成交客户</div>

        <div class="metric-card">
          <div class="metric-label">老客数</div>
          <div class="metric-value"><span class="count-up" data-target="380">0</span></div>

      <div class="card">

          </div>
        </div>
      </div>
    </div>

    <!-- 价格管控 -->
    <div class="page" id="page-price">
      <div class="px-3 py-3 bg-white">
        <h1 class="text-lg font-bold mb-3">价格管控</h1>
        <div class="flex gap-2">
          <input id="priceSearch" type="text" placeholder="输入款号搜索..." class="flex-1 text-xs border rounded-lg px-3 py-2" style="border-color:#ddd;">
          <select id="priceFilter" class="text-xs border rounded-lg px-2 py-1" style="color:#666;border-color:#ddd;">

          </select>
        </div>
      </div>
      <div class="mt-3" id="priceList"></div>
    </div>

    <!-- 货品管控 -->
    <div class="page" id="page-goods">

        <div class="flex gap-2">

          <div class="flex-1 text-center py-2 rounded-lg text-sm font-medium cursor-pointer view-tab" data-view="timeline" style="background:#f0f0f0;color:#999;">时间轴视图</div>
        </div>
      </div>
      <div class="mt-3" id="goodsContent"></div>
    </div>

    <!-- 活动管控 -->
    <div class="page" id="page-activity">
      <div class="px-3 py-3 bg-white">
        <h1 class="text-lg font-bold mb-3">活动管控</h1>
        <div class="flex gap-2">
          <div class="flex-1 text-center py-2 rounded-lg text-sm font-medium cursor-pointer activity-tab active" data-tab="calendar" style="background:#FF6B35;color:#fff;">活动日历</div>
          <div class="flex-1 text-center py-2 rounded-lg text-sm font-medium cursor-pointer activity-tab" data-tab="todo" style="background:#f0f0f0;color:#999;">我的待办</div>
        </div>
      </div>
      <div class="mt-3" id="activityContent"></div>
    </div>

    <!-- 我的 -->

      <div class="px-3 py-3 bg-white">
        <h1 class="text-lg font-bold">数据看板</h1>
      </div>
      <div class="mt-3" id="mineContent"></div>
    </div>
  </div>

  <div class="tab-bar" id="tabBar">
    <div class="tab-item active" data-tab="0"><span class="tab-icon">🏠</span><span class="tab-label">首页</span></div>
    <div class="tab-item" data-tab="1"><span class="tab-icon">💰</span><span class="tab-label">价格</span></div>

    <div class="tab-item" data-tab="4"><span class="tab-icon">👤</span><span class="tab-label">我的</span></div>
  </div>

  <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
  <div class="drawer" id="drawer"><div class="drawer-handle"></div><div id="drawerContent"></div></div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
      <h3 id="modalTitle">确认</h3>
      <p id="modalDesc">确定执行此操作？</p>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" id="modalConfirmBtn">确定</button>
      </div>
    </div>
  </div>
</div>

// ============================================================
// 工具函数
// ============================================================
function $(id) { return document.getElementById(id); }
function qs(sel, ctx) { return (ctx||document).querySelector(sel); }
function qsa(sel, ctx) { return (ctx||document).querySelectorAll(sel); }

function formatNum(n) { return n.toLocaleString(); }

function countUp(el, target, duration) {
  if (!el) return;
  const start = 0;
  const startTime = performance.now();
  function step(now) {
    const progress = Math.min((now - startTime) / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    const current = Math.round(start + (target - start) * eased);
    el.textContent = formatNum(current);
    if (progress < 1) requestAnimationFrame(step);
    else el.textContent = formatNum(target);
  }
  requestAnimationFrame(step);
}

function initCountUps(container) {
  container = container || document;
  container.querySelectorAll('.count-up').forEach(el => {
    const target = parseInt(el.dataset.target) || 0;
    countUp(el, target, 800);
  });
}

// ============================================================
// 页面切换
// ============================================================
let currentTab = 0;
const pageIds = ['page-home','page-price','page-goods','page-activity','page-mine'];

function switchTab(tabIndex) {
  if (tabIndex === currentTab) return;
  const oldPage = $(pageIds[currentTab]);
  const newPage = $(pageIds[tabIndex]);
  const direction = tabIndex > currentTab ? 1 : -1;

  oldPage.classList.remove('active');
  oldPage.classList.add('prev');
  newPage.style.transform = direction > 0 ? 'translateX(100%)' : 'translateX(-100%)';
  newPage.style.opacity = '0';
  newPage.classList.add('active');

  requestAnimationFrame(() => {
    newPage.style.transform = 'translateX(0)';
    newPage.style.opacity = '1';
    oldPage.style.transform = direction > 0 ? 'translateX(-30%)' : 'translateX(30%)';
  });

  setTimeout(() => {
    oldPage.classList.remove('prev');
    oldPage.style.transform = '';
    oldPage.style.opacity = '';
  }, 300);

  qsa('.tab-item').forEach((el, i) => {
    el.classList.toggle('active', i === tabIndex);
  });

  currentTab = tabIndex;
  renderPage(tabIndex);
}

function renderPage(tabIndex) {
  switch(tabIndex) {
    case 0: renderHome(); break;
    case 1: renderPriceList(); break;
    case 2: renderGoods(); break;
    case 3: renderActivity(); break;
    case 4: renderMine(); break;
  }
}

function getAlertCount(store) {
  let count = 0;
  // 价格异常
  const priceAbnormal = PRODUCTS.filter(p => {
    const prices = PRICE_DATA[p.id];
    if (!prices) return false;
    const vals = Object.values(prices);
    return Math.max(...vals) - Math.min(...vals) > 0;
  });
  if (priceAbnormal.length > 0) count++;
  // 货品异常
  const goodsAbnormal = PRODUCTS.filter(p => {
    const status = MATRIX_STATUS[p.id];
    if (!status) return false;
    const types = Object.values(status);
    return new Set(types).size > 2;
  });
  if (goodsAbnormal.length > 0) count++;
  // 活动待办
  const pendingActs = ACTIVITIES.filter(a => {
    if (a.scope === '全门店') return a.status === '待确认' && !store.confirmedActivities[a.id];
    return a.status === '待确认' && !store.acknowledgedActivities[a.id];
  });
  if (pendingActs.length > 0) count++;
  // 售后异常
  const unreplied = REVIEWS.filter(r => !r.replied && !store.repliedReviews[r.id]);
  if (unreplied.length > 0) count++;
  return count;
}

function renderPriceList() {
  const store = loadStorage();
  const search = ($('priceSearch')?.value || '').toLowerCase();
  const filter = $('priceFilter')?.value || 'all';

  let products = PRODUCTS.filter(p => {
    if (search && !p.id.toLowerCase().includes(search) && !p.name.includes(search)) return false;
    const isSynced = !!store.syncedPrices[p.id];
    if (filter === 'synced' && !isSynced) return false;
    if (filter === 'abnormal') {
      const prices = PRICE_DATA[p.id];
      if (!prices) return false;
      const vals = Object.values(prices);
      const isNormal = Math.max(...vals) - Math.min(...vals) === 0;
      if (isNormal) return false;
    }
    return true;
  });

  if (products.length === 0) {
    $('priceList').innerHTML = `<div class="empty-state"><div class="icon">🔍</div><div class="text">暂无匹配结果</div></div>`;
    return;
  }

  $('priceList').innerHTML = products.map(p => {
    const prices = PRICE_DATA[p.id];
    const isSynced = !!store.syncedPrices[p.id];
    const vals = Object.values(prices);
    const minPrice = Math.min(...vals);
    const maxPrice = Math.max(...vals);
    const hasDiff = maxPrice - minPrice > 0;

    return `
    <div class="card ${isSynced ? 'border-l-4' : ''}" style="${isSynced ? 'border-left:4px solid #00C853;' : ''}">
      <div class="flex items-center justify-between mb-2">
        <div>
          <span class="font-semibold text-sm">${p.id}</span>
          <span class="text-xs text-gray-500 ml-2">${p.name}</span>
        </div>
        ${isSynced ? '<span class="text-xs text-green-500 font-medium">✅ 已同步</span>' : ''}
      </div>
      ${CHANNELS.map(ch => {
        const price = prices[ch];
        const diff = price - minPrice;
        const diffPercent = minPrice > 0 ? ((diff / minPrice) * 100).toFixed(0) : 0;
        const isAbnormal = diff > 0;
        return `
        <div class="price-channel">
          <span class="channel-name">${ch}</span>
          <span class="channel-price">¥${price}</span>
          ${isAbnormal ? `<span class="channel-diff">+${diffPercent}%</span>` : ''}
          <span class="channel-status">${isAbnormal ? '❌' : '✅'}</span>
        </div>`;
      }).join('')}
      <div class="flex gap-2 mt-3 pt-3 border-t border-gray-50">
        ${hasDiff && !isSynced ? `
          <button class="btn btn-primary btn-sm" onclick="syncPrice('${p.id}')">同步到¥${minPrice}</button>
          <button class="btn btn-outline btn-sm" onclick="ignorePrice('${p.id}')">忽略</button>
        ` : ''}
        <button class="btn btn-outline btn-sm">查看趋势图</button>
      </div>
    </div>`;
  }).join('');
}

function syncPrice(productId) {
  showModal('确认同步', `确定将 ${productId} 同步到最低价？`, () => {
    const store = loadStorage();
    store.syncedPrices[productId] = Date.now();
    saveStorage(store);
    renderPriceList();
    renderHome();
  });
}

function ignorePrice(productId) {
  const store = loadStorage();
  store.syncedPrices[productId] = Date.now();
  saveStorage(store);
  renderPriceList();
  renderHome();
}

function renderCalendar() {
  const container = $('activityContent');
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const today = now.getDate();

  const eventDates = ACTIVITIES.map(a => parseInt(a.date.split('-')[2]));

  let html = '<div class="card"><div class="text-center font-semibold text-sm mb-3">' + year + '年' + (month+1) + '月</div>';
  html += '<div class="calendar-grid">';
  ['日','一','二','三','四','五','六'].forEach(d => { html += `<div class="calendar-header">${d}</div>`; });

  for (let i = 0; i < firstDay; i++) {
    html += '<div class="calendar-day other-month"></div>';
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const hasEvent = eventDates.includes(d);
    const isToday = d === today;
    html += `<div class="calendar-day ${isToday ? 'today' : ''} ${hasEvent ? 'has-event' : ''}" onclick="showDayEvents(${d})">${d}</div>`;
  }
  html += '</div></div>';

  // 活动列表
  html += '<div class="card"><div class="text-sm font-semibold mb-3">本月活动</div>';
  ACTIVITIES.forEach(a => {
    const store = loadStorage();
    const isConfirmed = store.confirmedActivities[a.id];
    const isAcknowledged = store.acknowledgedActivities[a.id];
    const statusColor = a.status === '进行中' ? '#00C853' : a.status === '待确认' ? '#FFC107' : '#999';
    html += `<div class="border-b border-gray-50 py-3 last:border-0">
      <div class="flex items-center justify-between">
        <div>
          <div class="text-sm font-medium">${a.name}</div>
          <div class="text-xs text-gray-400 mt-1">${a.date} · ${a.scope}${a.store ? ' · ' + a.store : ''}</div>
        </div>
        <span class="text-xs px-2 py-1 rounded-full" style="background:${statusColor}20;color:${statusColor};">${a.status}</span>
      </div>
      ${a.scope === '单门店' && !isAcknowledged && a.status === '待确认' ? `
        <div class="mt-2 flex items-center gap-2">
          <span class="text-xs text-red-500 font-medium">⚠️ 需知晓</span>
          <button class="btn btn-sm btn-success" onclick="acknowledgeActivity('${a.id}')">我已知晓</button>

      ${isConfirmed ? `<div class="mt-2 text-xs text-green-500">✅ 已确认</div>` : ''}
    </div>`;
  });
  html += '</div>';

  container.innerHTML = html;

      <div class="todo-info">
        <div class="todo-title">${a.name}</div>
        <div class="todo-desc">${a.date} · ${a.scope}${a.store ? ' · ' + a.store : ''}</div>
      </div>
      <button class="btn btn-primary btn-sm" onclick="confirmActivity('${a.id}')">确认</button>
    </div>`;
  });
  html += '</div>';
  container.innerHTML = html;
}

function confirmActivity(id) {
  showModal('确认活动', '是否已制定应对策略？', () => {
    const store = loadStorage();
    store.confirmedActivities[id] = Date.now();
    saveStorage(store);
    renderActivity();
    renderHome();
  });
}

function renderLineChart() {
  const width = 320, height = 160;
  const padding = { top: 20, right: 10, bottom: 25, left: 35 };
  const chartW = width - padding.left - padding.right;
  const chartH = height - padding.top - padding.bottom;

  const maxVal = Math.max(...SALES_TREND.map(d => Math.max(d.deals, d.returning, d.potential)));
  const scaleY = (v) => padding.top + chartH - (v / maxVal) * chartH;
  const scaleX = (i) => padding.left + (i / (SALES_TREND.length - 1)) * chartW;

  function makeLine(data, color) {
    const points = data.map((v, i) => `${scaleX(i)},${scaleY(v)}`).join(' ');
    return `<polyline points="${points}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round"/>`;
  }

  function makeDots(data, color) {
    return data.map((v, i) =>
      `<circle cx="${scaleX(i)}" cy="${scaleY(v)}" r="3" fill="${color}" stroke="#fff" stroke-width="1.5"/>`
    ).join('');
  }

  // Y轴刻度
  const yTicks = 4;
  let yLabels = '';
  for (let i = 0; i <= yTicks; i++) {
    const val = Math.round((maxVal / yTicks) * i);
    const y = scaleY(val);
    yLabels += `<text x="${padding.left - 5}" y="${y + 4}" text-anchor="end" font-size="10" fill="#999">${val}</text>`;
    yLabels += `<line x1="${padding.left}" y1="${y}" x2="${width - padding.right}" y2="${y}" stroke="#f0f0f0" stroke-width="1"/>`;
  }

  // X轴标签
  let xLabels = '';
  SALES_TREND.forEach((d, i) => {
    xLabels += `<text x="${scaleX(i)}" y="${height - 5}" text-anchor="middle" font-size="9" fill="#999">${d.date}</text>`;
  });

  // 图例
  const legend = `
    <rect x="${width - 120}" y="5" width="10" height="10" rx="2" fill="#FF6B35"/>
    <text x="${width - 106}" y="14" font-size="10" fill="#666">成交</text>
    <rect x="${width - 70}" y="5" width="10" height="10" rx="2" fill="#2196F3"/>
    <text x="${width - 56}" y="14" font-size="10" fill="#666">老客</text>
    <rect x="${width - 20}" y="5" width="10" height="10" rx="2" fill="#00C853"/>
    <text x="${width - 6}" y="14" font-size="10" fill="#666">潜在</text>
  `;

  const svg = `
    <div class="card">
      <div class="text-sm font-semibold mb-2">流量趋势（近7天）</div>
      <svg class="chart-svg" viewBox="0 0 ${width} ${height}">
        ${yLabels}
        ${xLabels}
        ${makeLine(SALES_TREND.map(d => d.deals), '#FF6B35')}
        ${makeLine(SALES_TREND.map(d => d.returning), '#2196F3')}
        ${makeLine(SALES_TREND.map(d => d.potential), '#00C853')}
        ${makeDots(SALES_TREND.map(d => d.deals), '#FF6B35')}
        ${makeDots(SALES_TREND.map(d => d.returning), '#2196F3')}
        ${makeDots(SALES_TREND.map(d => d.potential), '#00C853')}
        ${legend}
      </svg>
    </div>`;

  return svg;
}

// ============================================================
// 下拉刷新
// ============================================================
let pullStartY = 0;
let isPulling = false;

function initPullRefresh() {
  const homePage = $('page-home');
  const indicator = $('pullIndicator');

  homePage.addEventListener('touchstart', (e) => {
    if (homePage.scrollTop <= 0) {
      pullStartY = e.touches[0].clientY;
      isPulling = true;
    }
  }, { passive: true });

  homePage.addEventListener('touchmove', (e) => {
    if (!isPulling) return;
    const diff = e.touches[0].clientY - pullStartY;
    if (diff > 40) {
      indicator.textContent = '松开刷新';
      indicator.classList.add('show');
    } else {
      indicator.textContent = '↓ 下拉刷新';
    }
  }, { passive: true });

  homePage.addEventListener('touchend', () => {
    if (!isPulling) return;
    isPulling = false;
    if (indicator.classList.contains('show')) {
      indicator.textContent = '🔄 刷新中...';
      setTimeout(() => {
        indicator.textContent = '✅ 刷新完成';
        setTimeout(() => {
          indicator.classList.remove('show');
          indicator.textContent = '↓ 下拉刷新';
          renderHome();
        }, 500);
      }, 800);
    }
  }, { passive: true });
}
